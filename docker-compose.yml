version: '3.8'

services:

  mysql:
    image: mysql:8.4
    container_name: merchant-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: merchant_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  merchant-app:
    build: .
    container_name: merchant-onboarding

    ports:
      - "8081:8081"

    depends_on:
      - mysql

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/merchant_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data: